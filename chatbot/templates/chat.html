{% load static %}
<!DOCTYPE html>
<html>

<head>
<title>Osho AI Chatbot</title>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>


body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

#language{
padding:8px;
border-radius:6px;
margin-right:10px;
background:#1e293b;
color:white;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
top:0;
left:0;
background:#0f172a;
}

/* Sidebar */

.sidebar{
width:250px;
background:#020617;
border-right:1px solid #1e293b;
padding:20px;
}

.sidebar h2{
font-size:18px;
margin-bottom:20px;
}

.history{
font-size:14px;
color:#cbd5f5;
margin-bottom:10px;
cursor:pointer;
}

/* Main */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:18px;
background:#020617;
border-bottom:1px solid #1e293b;
font-size:20px;
text-align:center;
}

/* Chat */

.chat-container{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:12px;
}

.message-row{
display:flex;
align-items:flex-start;
gap:10px;
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
background:#2563eb;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.bot-avatar{
background:#9333ea;
}

.message{
padding:12px 16px;
border-radius:10px;
max-width:60%;
line-height:1.5;
}

.user{
background:#2563eb;
margin-left:auto;
}

.bot{
background:#1e293b;
}

/* Input */

.input-area{
display:flex;
padding:15px;
background:#020617;
border-top:1px solid #1e293b;
gap:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

/* typing dots */

.typing{
display:flex;
gap:4px;
padding:10px;
}

.dot{
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:blink 1.2s infinite;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
0%,80%,100%{opacity:.2}
40%{opacity:1}
}

.copy{
margin-left:10px;
font-size:12px;
cursor:pointer;
opacity:.7;
}

.copy:hover{
opacity:1;
}
#splash{
position:fixed;
width:100%;
height:100%;
background:#020617;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

#splash img{
width:220px;
border-radius:50%;
margin-bottom:20px;
}

#splash h1{
font-size:28px;
}
.osho-aura{
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

.osho-aura img{
width:220px;
border-radius:50%;
z-index:2;
}

/* glowing aura */

.osho-aura::before{

content:"";

position:absolute;

width:280px;
height:280px;

border-radius:50%;

background:radial-gradient(circle,
rgba(255,255,255,0.6),
rgba(147,51,234,0.4),
transparent 70%);

animation:auraGlow 4s infinite ease-in-out;

z-index:1;

}

@keyframes auraGlow{

0%{
transform:scale(1);
opacity:.6;
}

50%{
transform:scale(1.2);
opacity:1;
}

100%{
transform:scale(1);
opacity:.6;
}

}

</style>

</head>

<body>
    <div id="particles-js"></div>
    <audio id="meditationSound" loop>
  <source src="{% static 'meditation.mp3' %}" type="audio/mpeg">
</audio>

    <div id="splash">

<div class="osho-aura">

<img src="{% static 'osho.jpg' %}">

</div>

<h1>🙏 Namaste</h1>

</div>

<div class="sidebar">

<h2>🧘 Osho Chats</h2>

<div id="history"></div>

</div>

<div class="main">

<div class="header">
Osho AI Chatbot
</div>
<div id="quoteBox" style="text-align:center;padding:10px;font-style:italic;color:#cbd5f5;"></div>


<div class="chat-container" id="chatbox"></div>

<div class="input-area">
    <select id="language">
<option value="auto">Auto Detect</option>
<option value="English">English</option>
<option value="Hindi">Hindi</option>
</select>

<input id="message" placeholder="Ask about life...">

<button onclick="startVoice()">🎤</button>

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

let historyDiv=document.getElementById("history")

function addHistory(text){

let item=document.createElement("div")

item.className="history"

item.innerText=text.substring(0,30)

historyDiv.prepend(item)

}

function sendMessage(){

let message=document.getElementById("message").value

if(message==="") return

let chatbox=document.getElementById("chatbox")

chatbox.innerHTML+=`
<div class="message-row" style="justify-content:flex-end">
<div class="message user">${message}</div>
<div class="avatar">🧑</div>
</div>`

addHistory(message)

document.getElementById("message").value=""

let typing=`
<div class="message-row">
<div class="avatar bot-avatar">🧘</div>
<div class="message bot">
<div class="typing">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>
</div>`

chatbox.innerHTML+=typing

chatbox.scrollTop=chatbox.scrollHeight

fetch("/get/?message="+encodeURIComponent(message))

.then(response=>response.json())

.then(data=>{

document.querySelector(".typing").parentElement.innerHTML=
marked.parse(data.response)+
`<span class="copy" onclick="copyText(this)">📋</span>`

chatbox.scrollTop=chatbox.scrollHeight

speak(data.response)

})

}

function copyText(el){

let text=el.parentElement.innerText

navigator.clipboard.writeText(text)

el.innerText="✔"

setTimeout(()=>{el.innerText="📋"},1000)

}

document.getElementById("message")
.addEventListener("keypress",function(e){

if(e.key==="Enter") sendMessage()

})

function speak(text){

let speech = new SpeechSynthesisUtterance(text)

speech.lang = "en-US"

let voices = window.speechSynthesis.getVoices()

let voice = voices.find(v =>
v.name.toLowerCase().includes("male") ||
v.name.toLowerCase().includes("david") ||
v.name.toLowerCase().includes("daniel")
)

speech.voice = voice || voices[0]

speech.rate = 0.85
speech.pitch = 0.8

window.speechSynthesis.speak(speech)

}

function startVoice(){

const recognition=new webkitSpeechRecognition()

recognition.lang="en-US"

recognition.onresult=function(event){

let voiceText=event.results[0][0].transcript

document.getElementById("message").value=voiceText

sendMessage()

}

recognition.start()

}
setTimeout(()=>{

document.getElementById("splash").style.display="none"

},2500)
document.body.addEventListener("click",function(){

let sound=document.getElementById("meditationSound")

sound.play()

})
particlesJS("particles-js", {

particles: {

number: {
value: 80
},

color: {
value: "#ffffff"
},

shape: {
type: "circle"
},

opacity: {
value: 0.5
},

size: {
value: 3
},

line_linked: {
enable: true,
distance: 150,
color: "#ffffff",
opacity: 0.2
},

move: {
enable: true,
speed: 1
}

}

});

document.addEventListener("click", function () {
    let sound = document.getElementById("meditationSound");
    if (sound.paused) {
        sound.play();
    }
});

fetch("/quote/")
.then(res=>res.json())
.then(data=>{
document.getElementById("quoteBox").innerText="🧘 "+data.quote
})
</script>

</body>
</html>
